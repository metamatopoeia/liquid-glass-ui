name: "🐛 Bug Report"
description: "Report something that isn't working correctly."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
  - type: input
    id: version
    attributes:
      label: "Package Version"
      description: "Which version of @sds-smith/liquid-glass-ui are you using?"
      placeholder: "e.g., 1.0.9"
    validations:
      required: true
  - type: dropdown
    id: react-version
    attributes:
      label: "React Version"
      options:
        - "React 18"
        - "React 19"
        - "Other (please specify in description)"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps"
      description: "How can we see the bug? A link to a CodeSandbox is highly encouraged."
      placeholder: "1. Go to... 2. Click on... 3. See error..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "What did you expect to happen?"
    validations:
      required: true