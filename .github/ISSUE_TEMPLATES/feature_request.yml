name: "💡 Feature Request"
description: "Suggest an idea or a new UI component."
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "Is your feature request related to a problem? Please describe."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the 'liquid glass' effect or component you'd like to see added."
    validations:
      required: true
  - type: checkboxes
    id: agreement
    attributes:
      label: "Contribution Agreement"
      options:
        - label: "I understand that this project does not accept Pull Requests and I am submitting this for the maintainer to review."
          required: true