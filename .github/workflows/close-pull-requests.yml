name: Close Pull Requests

on:
  pull_request_target:
    types: [opened]

jobs:
  close-pr:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Close PR with a comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "Hi there! 👋 Thank you for your interest in @sds-smith/liquid-glass-ui.\n\nAt this time, this project is not accepting external Pull Requests to maintain a specific architectural direction. However, we highly value your feedback! Please feel free to open an **Issue** to discuss bugs or feature suggestions. This PR will be automatically closed."
            })
            github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed"
            })
