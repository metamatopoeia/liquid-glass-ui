name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (>=10.9.1 required for Trusted Publishers)
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: npm ci

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run release:version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug OIDC Claims
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm" | jq -r '.value')
          echo "::group::OIDC Token Claims"
          echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .
          echo "::endgroup::"

      - name: Debug npm config
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          echo "::group::npmrc contents"
          cat ~/.npmrc 2>/dev/null || echo "No user .npmrc"
          echo "::endgroup::"
          echo "::group::npm config list"
          npm config list
          echo "::endgroup::"
          echo "::group::npm whoami"
          npm whoami 2>&1 || true
          echo "::endgroup::"

      - name: Build and Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          npm run build
          npm publish --provenance --access public --verbose 2>&1 || {
            echo "::error::npm publish failed. Check OIDC claims and Trusted Publisher config on npmjs.org."
            exit 1
          }
